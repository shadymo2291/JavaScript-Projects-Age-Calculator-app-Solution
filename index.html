<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <meta name="description" content="calculate your age simply">
    <meta name="author" content="Shady Mohamed">
    <meta property="og:title" content="Frontend Mentor | Age calculator app" />

    <title>Frontend Mentor | Age calculator app</title>
    <!-- Main css File -->
    <link rel="stylesheet" href="css/main.css">
    <!-- Google Fonts Links -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

    <main>
        
        <!-- Start THE FORM  -->
        <form action="">
            <div class="input day">
                <label for="day_input">Day</label>
                <input type="number" id="day_input" name="day" placeholder="DD">
                <span class="invalid_value"></span>
            </div>

            <div class="input month">
                <label for="month_input">Month</label>
                <input type="number" id="month_input" name="month" placeholder="MM">
                <span class="invalid_value"></span>
            </div>

            <div class="input year">
                <label for="year_input">Year</label>
                <input type="number" id="year_input" name="year" placeholder="YYYY">
                <span class="invalid_value"></span>
            </div>
            <button type="submit">
                <img src="assets/images/icon-arrow.svg" alt="submit-icon">
            </button>
        </form>

        <!-- Start Showing THE RESULT Section -->
        <section class="result">
            <div class="displayed_years">
                <span class="target person_years">--</span>
                <span>years</span>
            </div>

            <div class="displayed_months">
                <span class="target person_month">--</span>
                <span>months</span>
            </div>

            <div class="displayed_days">
                <span class="target person_days">--</span>
                <span>days</span>
            </div>
        </section>
    </main>
    
    <script src="js/main.js"></script>
</body>
</html>
